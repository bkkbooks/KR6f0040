body:
  text: 後漢安息國三藏安世高譯聞如是一時佛遊於舍衛國爾時彌勒菩薩叉手白佛言世尊我欲小有所問若世尊聽所問者乃敢陳之佛言若有所疑便問吾當為汝解説使意歡喜彌勒問言云何菩薩摩訶薩不退轉法於大乘有進而不耗減行菩薩道並降伏魔怨如其狀貌悉還教知諸法根之相不厭於生死自有正慧不從他受疾成無上一切智地世尊讚曰善哉善哉所問隨順甚善大佳吾當為汝解説菩薩所得之行踰於所問諦聽善思念之於是彌勒受教一心靜聽佛告彌勒菩薩有八法具足疾逮得無上一切智地何謂為八一者內性清淨二者所行成就三者所施成就四者所願成就五者慈成就六者悲成就七者善權成就八者智慧成就是為八事菩薩疾逮得無上一切智彌勒菩薩及諸衆會皆歡喜
